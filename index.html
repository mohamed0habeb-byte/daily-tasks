<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول المهام اليومية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --blue-900:#0b2d5c;
    --blue-700:#1652a6;
    --blue-500:#2f7de1;
    --blue-100:#e7f0ff;
    --blue-050:#f4f8ff;
    --white:#ffffff;
    --gray-500:#7c8aa0;
    --border:#dce6f7;
    --radius:16px;
    --shadow: 0 8px 24px rgba(22,82,166,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Tajawal', sans-serif;
    background: linear-gradient(180deg, var(--blue-050) 0%, var(--white) 320px);
    color:var(--blue-900);
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .wrap{max-width:820px;margin:0 auto;}

  /* Header */
  .header{
    background: linear-gradient(135deg, var(--blue-900), var(--blue-700));
    border-radius: var(--radius);
    padding:28px 28px 24px;
    color:var(--white);
    box-shadow: var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .header::after{
    content:"";
    position:absolute;
    left:-40px; top:-40px;
    width:160px; height:160px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
  }
  .header-date-btn{
    background:none;
    border:none;
    padding:0;
    margin:0;
    text-align:right;
    cursor:pointer;
    display:block;
    width:100%;
  }
  .header-date-btn .day-name{
    font-size:28px;
    font-weight:900;
    margin:0;
    color:var(--white);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .header-date-btn .day-name .cal-icon{ font-size:20px; opacity:0.85; }
  .header .date-full{
    margin-top:6px;
    font-size:15px;
    color:#cfe0ff;
    font-weight:500;
  }
  .today-chip{
    display:inline-block;
    background:rgba(255,255,255,0.18);
    color:var(--white);
    font-size:11.5px;
    font-weight:700;
    padding:2px 10px;
    border-radius:999px;
    margin-right:8px;
  }
  .back-today-btn{
    margin-top:10px;
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(255,255,255,0.15);
    border:none;
    color:var(--white);
    font-size:12.5px;
    font-weight:700;
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
  }
  .back-today-btn:hover{ background:rgba(255,255,255,0.26); }
  .header .progress-row{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .progress-track{
    flex:1;
    height:8px;
    background:rgba(255,255,255,0.18);
    border-radius:999px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--white);
    border-radius:999px;
    transition:width .35s ease;
  }
  .progress-label{
    font-size:13px;
    font-weight:700;
    color:var(--white);
    white-space:nowrap;
  }

  /* Section title */
  .section-title{
    margin:28px 0 12px;
    font-size:15px;
    font-weight:700;
    color:var(--blue-700);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title .dot{
    width:8px;height:8px;border-radius:50%;background:var(--blue-500);
  }

  /* Task card list */
  .task{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    box-shadow:0 2px 8px rgba(22,82,166,0.04);
    transition:box-shadow .2s ease, border-color .2s ease;
  }
  .task:hover{ box-shadow:var(--shadow); }
  .task.done{
    background:var(--blue-050);
    border-color:var(--blue-100);
  }
  .time-badge{
    min-width:62px;
    text-align:center;
    background:var(--blue-100);
    color:var(--blue-700);
    font-weight:700;
    font-size:13px;
    padding:8px 6px;
    border-radius:10px;
    flex-shrink:0;
  }
  .task.done .time-badge{
    background:var(--blue-700);
    color:var(--white);
  }
  .task-info{
    flex:1;
    min-width:0;
  }
  .task-name{
    font-weight:700;
    font-size:15.5px;
    color:var(--blue-900);
  }
  .task.done .task-name{
    text-decoration:line-through;
    text-decoration-color:var(--blue-500);
    color:var(--gray-500);
  }
  .task-sub{
    font-size:12.5px;
    color:var(--gray-500);
    margin-top:2px;
  }
  .task-badge-once{
    display:inline-block;
    font-size:10.5px;
    font-weight:700;
    color:var(--blue-700);
    background:var(--blue-100);
    padding:1px 7px;
    border-radius:999px;
    margin-right:6px;
  }
  .task-editable-input{
    width:100%;
    border:1px dashed var(--border);
    background:var(--white);
    border-radius:8px;
    padding:6px 8px;
    font-family:inherit;
    font-size:14px;
    color:var(--blue-900);
    margin-top:4px;
  }
  .task-editable-input:focus{
    outline:none;
    border-color:var(--blue-500);
  }
  .check-btn{
    flex-shrink:0;
    width:38px;height:38px;
    border-radius:50%;
    border:2px solid var(--blue-500);
    background:var(--white);
    color:var(--blue-500);
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:all .15s ease;
  }
  .check-btn:hover{ transform:scale(1.06); }
  .check-btn.checked{
    background:var(--blue-500);
    color:var(--white);
  }
  .icon-btn{
    flex-shrink:0;
    width:30px;height:30px;
    border-radius:8px;
    border:none;
    background:transparent;
    color:var(--gray-500);
    font-size:15px;
    cursor:pointer;
  }
  .icon-btn:hover{ color:var(--blue-700); background:var(--blue-050); }
  .icon-btn.del-btn:hover{ color:#c0392b; background:#fdeceb; }

  .empty-note{
    font-size:13.5px;
    color:var(--gray-500);
    background:var(--blue-050);
    border:1px dashed var(--border);
    border-radius:12px;
    padding:14px;
    text-align:center;
  }

  /* Add/edit goal form */
  .add-card{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:14px;
    padding:16px;
    margin-top:10px;
  }
  .add-form{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }
  .add-form input[type="text"]{
    flex:2;
    min-width:140px;
  }
  .add-form input[type="time"]{
    flex:1;
    min-width:110px;
  }
  .add-form input[type="text"],
  .add-form input[type="time"]{
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    font-family:inherit;
    font-size:14px;
    color:var(--blue-900);
    background:var(--blue-050);
  }
  .add-form input:focus{
    outline:none;
    border-color:var(--blue-500);
    background:var(--white);
  }
  .recurring-toggle{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:13.5px;
    color:var(--blue-900);
    font-weight:600;
    background:var(--blue-050);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    flex:1;
    min-width:200px;
  }
  .recurring-toggle input{ accent-color:var(--blue-500); width:16px; height:16px; }
  .add-btn{
    border:none;
    background:var(--blue-700);
    color:var(--white);
    font-weight:700;
    font-size:14px;
    padding:10px 20px;
    border-radius:10px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .add-btn:hover{ background:var(--blue-900); }
  .cancel-edit-btn{
    border:none;
    background:none;
    color:var(--gray-500);
    font-weight:700;
    font-size:13px;
    padding:10px 8px;
    cursor:pointer;
  }

  .toggle-add{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:none;
    border:none;
    color:var(--blue-700);
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    padding:6px 2px;
  }

  footer{
    text-align:center;
    margin-top:30px;
    font-size:12px;
    color:var(--gray-500);
  }

  /* Weight input card */
  .weight-card{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 16px;
    margin-top:14px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 2px 8px rgba(22,82,166,0.04);
  }
  .weight-card label{
    font-weight:700;
    font-size:13.5px;
    color:var(--blue-900);
    white-space:nowrap;
  }
  .weight-input-wrap{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:6px;
    background:var(--blue-050);
    border:1px solid var(--border);
    border-radius:9px;
    padding:2px 10px;
  }
  .weight-input-wrap input{
    width:64px;
    flex:none;
    border:none;
    background:transparent;
    font-family:inherit;
    font-size:14.5px;
    font-weight:700;
    color:var(--blue-900);
    padding:6px 2px;
    min-width:0;
  }
  .weight-input-wrap input:focus{ outline:none; }
  .weight-unit{
    font-size:13px;
    color:var(--gray-500);
    font-weight:600;
    flex-shrink:0;
  }
  .saved-flash{
    font-size:12px;
    color:var(--blue-500);
    font-weight:700;
    opacity:0;
    transition:opacity .3s ease;
    flex-shrink:0;
  }
  .saved-flash.show{ opacity:1; }

  /* Dashboard */
  .dashboard-card{
    background:var(--white);
    border:1px solid var(--border);
    border-radius:14px;
    padding:18px;
    margin-top:12px;
    box-shadow:0 2px 8px rgba(22,82,166,0.04);
  }
  .dashboard-title{
    font-size:14px;
    font-weight:700;
    color:var(--blue-700);
    margin:0 0 12px;
  }
  .dashboard-stats{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .stat-pill{
    flex:1;
    min-width:110px;
    background:var(--blue-050);
    border-radius:10px;
    padding:10px 12px;
    text-align:center;
  }
  .stat-pill .stat-label{
    font-size:11.5px;
    color:var(--gray-500);
    font-weight:600;
    margin-bottom:4px;
  }
  .stat-pill .stat-value{
    font-size:17px;
    font-weight:900;
    color:var(--blue-900);
  }
  .stat-pill .stat-value.down{ color:var(--blue-500); }
  .stat-pill .stat-value.up{ color:#5c6b80; }
  .chart-wrap{ width:100%; overflow:hidden; }
  .chart-wrap svg{ width:100%; height:130px; display:block; }
  .chart-axis-label{
    font-size:10.5px;
    fill:var(--gray-500);
  }

  /* Calendar modal */
  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(11,45,92,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:16px;
  }
  .modal-overlay.open{ display:flex; }
  .calendar-modal{
    background:var(--white);
    border-radius:18px;
    padding:20px;
    width:100%;
    max-width:380px;
    box-shadow:0 20px 50px rgba(11,45,92,0.25);
  }
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:14px;
  }
  .cal-nav-btn{
    width:32px;height:32px;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--blue-050);
    color:var(--blue-700);
    font-size:16px;
    cursor:pointer;
  }
  .cal-nav-btn:hover{ background:var(--blue-100); }
  .cal-title{
    font-weight:800;
    font-size:16px;
    color:var(--blue-900);
  }
  .cal-close-btn{
    position:absolute;
    top:14px; left:14px;
    background:none;
    border:none;
    font-size:18px;
    color:var(--gray-500);
    cursor:pointer;
  }
  .calendar-modal{ position:relative; }
  .cal-weekdays, .cal-days{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:4px;
    text-align:center;
  }
  .cal-weekdays div{
    font-size:11.5px;
    font-weight:700;
    color:var(--gray-500);
    padding:4px 0;
  }
  .cal-day-cell{
    position:relative;
    aspect-ratio:1;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-size:13.5px;
    font-weight:600;
    color:var(--blue-900);
    background:transparent;
    border:none;
    cursor:pointer;
  }
  .cal-day-cell:hover{ background:var(--blue-050); }
  .cal-day-cell.empty{ cursor:default; }
  .cal-day-cell.empty:hover{ background:transparent; }
  .cal-day-cell.is-today{ border:2px solid var(--blue-500); }
  .cal-day-cell.is-selected{ background:var(--blue-700); color:var(--white); }
  .cal-day-cell .act-dot{
    position:absolute;
    bottom:4px;
    width:5px;height:5px;
    border-radius:50%;
    background:var(--blue-500);
  }
  .cal-day-cell.is-selected .act-dot{ background:var(--white); }
  .cal-legend{
    margin-top:12px;
    font-size:11.5px;
    color:var(--gray-500);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .cal-legend .dot-sample{
    width:6px;height:6px;border-radius:50%;background:var(--blue-500);display:inline-block;
  }

  @media (max-width:480px){
    .header{padding:22px 18px;}
    .header-date-btn .day-name{font-size:23px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <button class="header-date-btn" id="openCalendarBtn">
      <p class="day-name"><span class="cal-icon">📅</span><span id="dayName">--</span></p>
      <p class="date-full" id="dateFull">--</p>
    </button>
    <button class="back-today-btn" id="backTodayBtn" style="display:none;">↺ الرجوع لليوم</button>
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-label" id="progressLabel">0 / 0</span>
    </div>
  </div>

  <div class="weight-card">
    <label for="weightInput">⚖️ وزنك اليوم</label>
    <div class="weight-input-wrap">
      <input type="number" id="weightInput" step="0.1" inputmode="decimal" placeholder="مثال: 82.5">
      <span class="weight-unit">كجم</span>
    </div>
    <span class="saved-flash" id="savedFlash">تم الحفظ ✓</span>
  </div>

  <div class="dashboard-card" id="dashboardCard">
    <p class="dashboard-title">📈 متابعة تغيّر الوزن</p>
    <div id="dashboardBody"></div>
  </div>

  <div class="section-title"><span class="dot"></span> مهام اليوم</div>
  <div id="dailyTasks"></div>

  <div id="weekendSection" style="display:none;">
    <div class="section-title"><span class="dot"></span> مهمة الجمعة والسبت</div>
    <div id="weekendTasks"></div>
  </div>

  <div class="add-card">
    <button class="toggle-add" id="toggleAddBtn">＋ إضافة هدف جديد</button>
    <div class="add-form" id="addForm" style="display:none; margin-top:12px;">
      <input type="text" id="newTaskName" placeholder="اسم الهدف (مثال: قراءة)">
      <input type="time" id="newTaskTime" value="08:00">
      <label class="recurring-toggle">
        <input type="checkbox" id="newTaskRecurring" checked>
        <span id="recurringLabel">هدف متكرر يوميًا</span>
      </label>
      <button class="add-btn" id="saveNewTaskBtn">إضافة</button>
      <button class="cancel-edit-btn" id="cancelEditBtn" style="display:none;">إلغاء</button>
    </div>
  </div>

  <footer>يتم حفظ بياناتك تلقائيًا على هذا الجهاز</footer>
</div>

<!-- Calendar Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="calendar-modal">
    <button class="cal-close-btn" id="closeCalendarBtn">✕</button>
    <div class="cal-header">
      <button class="cal-nav-btn" id="prevMonthBtn">‹</button>
      <span class="cal-title" id="calTitle">--</span>
      <button class="cal-nav-btn" id="nextMonthBtn">›</button>
    </div>
    <div class="cal-weekdays">
      <div>أح</div><div>إث</div><div>ثل</div><div>أر</div><div>خم</div><div>جم</div><div>سب</div>
    </div>
    <div class="cal-days" id="calDays"></div>
    <div class="cal-legend"><span class="dot-sample"></span> يوجد نشاط مسجل في هذا اليوم</div>
  </div>
</div>

<script>
const DAY_NAMES = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const MONTH_NAMES = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];

function todayKey(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function keyToDate(key){
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d);
}

const REAL_TODAY = new Date();
const REAL_TODAY_KEY = todayKey(REAL_TODAY);

// viewDate = the date currently being displayed/edited (defaults to today)
let viewDate = new Date();
let dateKey = todayKey(viewDate);
let dow = viewDate.getDay();
let isWeekend = (dow === 5 || dow === 6);

// calendar modal state
let calMonth = viewDate.getMonth();
let calYear = viewDate.getFullYear();

function refreshDateDerivedState(){
  dateKey = todayKey(viewDate);
  dow = viewDate.getDay();
  isWeekend = (dow === 5 || dow === 6);
}

function updateHeader(){
  const isToday = dateKey === REAL_TODAY_KEY;
  document.getElementById('dayName').textContent = "يوم " + DAY_NAMES[dow];
  document.getElementById('dateFull').textContent = `${viewDate.getDate()} ${MONTH_NAMES[viewDate.getMonth()]} ${viewDate.getFullYear()}` + (isToday ? '' : '');
  document.getElementById('backTodayBtn').style.display = isToday ? 'none' : 'inline-flex';
}

// ---------- storage helpers ----------
const TASKS_KEY = 'tracker_tasks_v1';
const STATUS_KEY = 'tracker_status_v1';
const WEEKEND_TEXT_KEY = 'tracker_weekend_text_v1';
const WEIGHT_KEY = 'tracker_weight_v1';

function loadTasks(){
  let raw = localStorage.getItem(TASKS_KEY);
  if(!raw){
    const defaults = [
      {id:'t1', name:'نط الحبل', time:'07:00', recurring:true},
      {id:'t2', name:'نط الحبل', time:'19:00', recurring:true}
    ];
    localStorage.setItem(TASKS_KEY, JSON.stringify(defaults));
    return defaults;
  }
  try{
    const parsed = JSON.parse(raw);
    // backward-compat: ensure recurring field exists
    return parsed.map(t => ({recurring:true, ...t}));
  } catch(e){ return []; }
}
function saveTasks(t){ localStorage.setItem(TASKS_KEY, JSON.stringify(t)); }

function loadStatusAll(){
  let raw = localStorage.getItem(STATUS_KEY);
  try{ return raw ? JSON.parse(raw) : {}; } catch(e){ return {}; }
}
function saveStatus(all){ localStorage.setItem(STATUS_KEY, JSON.stringify(all)); }

function loadWeekendTexts(){
  let raw = localStorage.getItem(WEEKEND_TEXT_KEY);
  try{ return raw ? JSON.parse(raw) : {}; } catch(e){ return {}; }
}
function saveWeekendTexts(all){ localStorage.setItem(WEEKEND_TEXT_KEY, JSON.stringify(all)); }

function loadWeights(){
  let raw = localStorage.getItem(WEIGHT_KEY);
  try{ return raw ? JSON.parse(raw) : {}; } catch(e){ return {}; }
}
function saveWeights(all){ localStorage.setItem(WEIGHT_KEY, JSON.stringify(all)); }

let tasks = loadTasks();
let statusAll = loadStatusAll();
let weekendTexts = loadWeekendTexts();
let weights = loadWeights();
let editingTaskId = null;

function ensureStatusDay(key){
  if(!statusAll[key]) statusAll[key] = {};
  return statusAll[key];
}

// ---------- render ----------
function render(){
  updateHeader();
  ensureStatusDay(dateKey);

  const dailyEl = document.getElementById('dailyTasks');
  dailyEl.innerHTML = '';

  // visible tasks: recurring ones always, one-time ones only on their assigned date
  const visible = tasks.filter(t => t.recurring || t.date === dateKey);
  const sorted = [...visible].sort((a,b)=> a.time.localeCompare(b.time));

  if(sorted.length === 0){
    dailyEl.innerHTML = '<div class="empty-note">لا توجد أهداف في هذا اليوم، أضف هدف 👇</div>';
  }

  sorted.forEach(task=>{
    const done = !!statusAll[dateKey][task.id];
    const card = document.createElement('div');
    card.className = 'task' + (done ? ' done' : '');
    card.innerHTML = `
      <div class="time-badge">${task.time}</div>
      <div class="task-info">
        <div class="task-name">${task.recurring ? '' : '<span class="task-badge-once">مرة واحدة</span>'}${escapeHtml(task.name)}</div>
        <div class="task-sub">${task.recurring ? 'هدف يومي متكرر' : 'هدف خاص بهذا اليوم فقط'}</div>
      </div>
      <button class="icon-btn edit-btn" title="تعديل الهدف" data-id="${task.id}">✎</button>
      <button class="icon-btn del-btn" title="حذف الهدف" data-id="${task.id}">✕</button>
      <button class="check-btn ${done ? 'checked':''}" data-id="${task.id}">${done ? '✓' : ''}</button>
    `;
    dailyEl.appendChild(card);
  });

  // weekend section
  const weekendSection = document.getElementById('weekendSection');
  const weekendEl = document.getElementById('weekendTasks');
  if(isWeekend){
    weekendSection.style.display = 'block';
    const wDone = !!statusAll[dateKey]['weekend'];
    const wText = weekendTexts[dateKey] || '';
    const card = document.createElement('div');
    weekendEl.innerHTML = '';
    card.className = 'task' + (wDone ? ' done' : '');
    card.innerHTML = `
      <div class="time-badge">08:00</div>
      <div class="task-info">
        <input type="text" class="task-editable-input" id="weekendInput" placeholder="اكتب هدف اليوم هنا..." value="${escapeHtml(wText)}">
      </div>
      <button class="check-btn ${wDone ? 'checked':''}" id="weekendCheckBtn">${wDone ? '✓' : ''}</button>
    `;
    weekendEl.appendChild(card);

    document.getElementById('weekendInput').addEventListener('input', (e)=>{
      weekendTexts[dateKey] = e.target.value;
      saveWeekendTexts(weekendTexts);
    });
    document.getElementById('weekendCheckBtn').addEventListener('click', ()=>{
      statusAll[dateKey]['weekend'] = !statusAll[dateKey]['weekend'];
      saveStatus(statusAll);
      render();
    });
  } else {
    weekendSection.style.display = 'none';
  }

  // wire up check/delete/edit buttons
  dailyEl.querySelectorAll('.check-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-id');
      statusAll[dateKey][id] = !statusAll[dateKey][id];
      saveStatus(statusAll);
      render();
    });
  });
  dailyEl.querySelectorAll('.del-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-id');
      if(confirm('هل تريد حذف هذا الهدف؟')){
        tasks = tasks.filter(t=>t.id !== id);
        saveTasks(tasks);
        render();
      }
    });
  });
  dailyEl.querySelectorAll('.edit-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-id');
      startEditTask(id);
    });
  });

  updateProgress();
}

function updateProgress(){
  const visible = tasks.filter(t => t.recurring || t.date === dateKey);
  const total = visible.length + (isWeekend ? 1 : 0);
  let done = visible.filter(t=> !!statusAll[dateKey][t.id]).length;
  if(isWeekend && statusAll[dateKey]['weekend']) done += 1;
  const pct = total === 0 ? 0 : Math.round((done/total)*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ---------- weight dashboard ----------
function fmtShortDate(key){
  const [y,m,d] = key.split('-');
  return `${parseInt(d)}/${parseInt(m)}`;
}

function renderDashboard(){
  const body = document.getElementById('dashboardBody');
  const entries = Object.keys(weights)
    .filter(k => typeof weights[k] === 'number' && !isNaN(weights[k]))
    .sort()
    .map(k => ({date:k, w:weights[k]}));

  if(entries.length === 0){
    body.innerHTML = '<div class="empty-note">سجّل وزنك اليوم عشان يبدأ الرسم البياني يظهر 👆</div>';
    return;
  }
  if(entries.length === 1){
    body.innerHTML = `
      <div class="dashboard-stats">
        <div class="stat-pill">
          <div class="stat-label">الوزن المسجل</div>
          <div class="stat-value">${entries[0].w}</div>
        </div>
      </div>
      <div class="empty-note">سجّل وزنك لأيام تانية عشان تشوف التغيّر بمرور الوقت.</div>
    `;
    return;
  }

  const current = entries[entries.length - 1].w;
  const prev = entries[entries.length - 2].w;
  const first = entries[0].w;
  const deltaPrev = +(current - prev).toFixed(1);
  const deltaTotal = +(current - first).toFixed(1);

  function deltaHtml(delta){
    if(delta === 0) return `<span class="stat-value">0.0</span>`;
    const cls = delta < 0 ? 'down' : 'up';
    const arrow = delta < 0 ? '▼' : '▲';
    return `<span class="stat-value ${cls}">${arrow} ${Math.abs(delta)}</span>`;
  }

  const W = 600, H = 130, pad = 24;
  const ws = entries.map(e=>e.w);
  let min = Math.min(...ws), max = Math.max(...ws);
  if(min === max){ min -= 1; max += 1; }
  const n = entries.length;
  const points = entries.map((e,i)=>{
    const x = n === 1 ? W/2 : pad + (i/(n-1)) * (W - 2*pad);
    const y = H - pad - ((e.w - min)/(max - min)) * (H - 2*pad);
    return {x, y, w:e.w, date:e.date};
  });
  const linePath = points.map(p=>`${p.x},${p.y}`).join(' ');
  const areaPath = `M${points[0].x},${H-pad} L` + points.map(p=>`${p.x},${p.y}`).join(' L') + ` L${points[points.length-1].x},${H-pad} Z`;

  const circles = points.map((p,i)=>{
    const isLast = i === points.length - 1;
    return `<circle cx="${p.x}" cy="${p.y}" r="${isLast?4.5:3}" fill="${isLast?'var(--blue-900)':'var(--blue-500)'}" stroke="white" stroke-width="1.5"/>`;
  }).join('');

  const firstLabel = fmtShortDate(entries[0].date);
  const lastLabel = fmtShortDate(entries[entries.length-1].date);

  body.innerHTML = `
    <div class="dashboard-stats">
      <div class="stat-pill">
        <div class="stat-label">آخر وزن مسجل</div>
        <div class="stat-value">${current}</div>
      </div>
      <div class="stat-pill">
        <div class="stat-label">من التسجيل السابق</div>
        ${deltaHtml(deltaPrev)}
      </div>
      <div class="stat-pill">
        <div class="stat-label">من أول تسجيل</div>
        ${deltaHtml(deltaTotal)}
      </div>
    </div>
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <path d="${areaPath}" fill="var(--blue-100)" opacity="0.6"/>
        <polyline points="${linePath}" fill="none" stroke="var(--blue-500)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${circles}
        <text x="${points[0].x}" y="${H-6}" class="chart-axis-label" text-anchor="middle">${firstLabel}</text>
        <text x="${points[points.length-1].x}" y="${H-6}" class="chart-axis-label" text-anchor="middle">${lastLabel}</text>
      </svg>
    </div>
  `;
}

function initWeightInput(){
  const input = document.getElementById('weightInput');
  const flash = document.getElementById('savedFlash');

  function refreshInputValue(){
    input.value = (typeof weights[dateKey] === 'number') ? weights[dateKey] : '';
  }
  refreshInputValue();

  let flashTimeout;
  function save(){
    const val = parseFloat(input.value);
    if(!isNaN(val) && val > 0){
      weights[dateKey] = val;
      saveWeights(weights);
      renderDashboard();
      flash.classList.add('show');
      clearTimeout(flashTimeout);
      flashTimeout = setTimeout(()=> flash.classList.remove('show'), 1500);
    }
  }
  input.addEventListener('change', save);
  input.addEventListener('blur', save);
  input._refreshValue = refreshInputValue;
}

// ---------- add / edit task ----------
function resetAddForm(){
  document.getElementById('newTaskName').value = '';
  document.getElementById('newTaskTime').value = '08:00';
  document.getElementById('newTaskRecurring').checked = true;
  document.getElementById('recurringLabel').textContent = 'هدف متكرر يوميًا';
  document.getElementById('saveNewTaskBtn').textContent = 'إضافة';
  document.getElementById('cancelEditBtn').style.display = 'none';
  editingTaskId = null;
}

function startEditTask(id){
  const task = tasks.find(t=>t.id === id);
  if(!task) return;
  editingTaskId = id;
  document.getElementById('addForm').style.display = 'flex';
  document.getElementById('newTaskName').value = task.name;
  document.getElementById('newTaskTime').value = task.time;
  document.getElementById('newTaskRecurring').checked = !!task.recurring;
  document.getElementById('saveNewTaskBtn').textContent = 'حفظ التعديل';
  document.getElementById('cancelEditBtn').style.display = 'inline-block';
  document.getElementById('newTaskName').focus();
}

document.getElementById('toggleAddBtn').addEventListener('click', ()=>{
  const form = document.getElementById('addForm');
  if(form.style.display === 'none'){
    resetAddForm();
    form.style.display = 'flex';
  } else {
    form.style.display = 'none';
    resetAddForm();
  }
});
document.getElementById('cancelEditBtn').addEventListener('click', ()=>{
  resetAddForm();
  document.getElementById('addForm').style.display = 'none';
});
document.getElementById('saveNewTaskBtn').addEventListener('click', ()=>{
  const nameInput = document.getElementById('newTaskName');
  const timeInput = document.getElementById('newTaskTime');
  const recurringInput = document.getElementById('newTaskRecurring');
  const name = nameInput.value.trim();
  const time = timeInput.value || '08:00';
  const recurring = recurringInput.checked;

  if(!name){ nameInput.focus(); return; }

  if(editingTaskId){
    const task = tasks.find(t=>t.id === editingTaskId);
    if(task){
      task.name = name;
      task.time = time;
      task.recurring = recurring;
      if(!recurring && !task.date) task.date = dateKey;
      if(recurring) delete task.date;
    }
  } else {
    const id = 't' + Date.now();
    const newTask = {id, name, time, recurring};
    if(!recurring) newTask.date = dateKey;
    tasks.push(newTask);
  }
  saveTasks(tasks);
  resetAddForm();
  document.getElementById('addForm').style.display = 'none';
  render();
});

// ---------- calendar modal ----------
function dayHasActivity(key){
  const s = statusAll[key];
  if(s && Object.values(s).some(v=>v)) return true;
  if(typeof weights[key] === 'number') return true;
  if(weekendTexts[key] && weekendTexts[key].trim()) return true;
  return false;
}

function openCalendar(){
  calMonth = viewDate.getMonth();
  calYear = viewDate.getFullYear();
  renderCalendar();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeCalendar(){
  document.getElementById('modalOverlay').classList.remove('open');
}

function renderCalendar(){
  document.getElementById('calTitle').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`;
  const daysEl = document.getElementById('calDays');
  daysEl.innerHTML = '';

  const firstOfMonth = new Date(calYear, calMonth, 1);
  const startWeekday = firstOfMonth.getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  for(let i=0;i<startWeekday;i++){
    const empty = document.createElement('div');
    empty.className = 'cal-day-cell empty';
    daysEl.appendChild(empty);
  }

  for(let d=1; d<=daysInMonth; d++){
    const cellDate = new Date(calYear, calMonth, d);
    const key = todayKey(cellDate);
    const btn = document.createElement('button');
    btn.className = 'cal-day-cell';
    if(key === REAL_TODAY_KEY) btn.classList.add('is-today');
    if(key === dateKey) btn.classList.add('is-selected');
    btn.innerHTML = String(d) + (dayHasActivity(key) ? '<span class="act-dot"></span>' : '');
    btn.addEventListener('click', ()=>{
      viewDate = cellDate;
      refreshDateDerivedState();
      closeCalendar();
      render();
      initWeightInput();
      renderDashboard();
    });
    daysEl.appendChild(btn);
  }
}

document.getElementById('openCalendarBtn').addEventListener('click', openCalendar);
document.getElementById('closeCalendarBtn').addEventListener('click', closeCalendar);
document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'modalOverlay') closeCalendar();
});
document.getElementById('prevMonthBtn').addEventListener('click', ()=>{
  calMonth--;
  if(calMonth < 0){ calMonth = 11; calYear--; }
  renderCalendar();
});
document.getElementById('nextMonthBtn').addEventListener('click', ()=>{
  calMonth++;
  if(calMonth > 11){ calMonth = 0; calYear++; }
  renderCalendar();
});
document.getElementById('backTodayBtn').addEventListener('click', ()=>{
  viewDate = new Date();
  refreshDateDerivedState();
  render();
  initWeightInput();
  renderDashboard();
});

render();
initWeightInput();
renderDashboard();
</script>
